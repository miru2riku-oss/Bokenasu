<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボケナス / Bokenasu - P2P File Share</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --primary: #4F46E5; --primary-hover: #4338CA;
            --bg-color: #F3F4F6; --card-bg: #FFFFFF;
            --text-main: #1F2937; --text-muted: #6B7280;
            --danger: #EF4444; --success: #10B981; --warning: #F59E0B;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color);
            color: var(--text-main); margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; color: var(--primary); font-size: 2.5rem; letter-spacing: -1px; }
        .header p { margin: 5px 0 0; color: var(--text-muted); }
        .name-display { margin-top: 10px; display: inline-flex; align-items: center; gap: 10px; background: #E5E7EB; padding: 5px 15px; border-radius: 20px; }
        
        .container {
            width: 100%; max-width: 600px; background: var(--card-bg);
            border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden;
        }
        
        /* タブメニュー */
        .tabs { display: flex; background: #E5E7EB; }
        .tab {
            flex: 1; padding: 15px; text-align: center; font-weight: bold; cursor: pointer;
            color: var(--text-muted); transition: 0.3s;
        }
        .tab.active { background: var(--card-bg); color: var(--primary); border-top: 3px solid var(--primary); }
        .content { padding: 25px; display: none; }
        .content.active { display: block; }
        
        h3 { margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid #F3F4F6; padding-bottom: 10px; }
        
        /* フォーム部品 */
        input[type="text"], input[type="password"], input[type="number"] {
            width: 100%; padding: 12px; margin: 8px 0 16px;
            border: 1px solid #D1D5DB; border-radius: 8px; box-sizing: border-box; font-size: 1rem;
        }
        button {
            width: 100%; padding: 12px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:hover { background: var(--primary-hover); }
        button:disabled { background: #9CA3AF; cursor: not-allowed; }
        button.danger { background: var(--danger); margin-top: 10px; }
        button.danger:hover { background: #DC2626; }
        button.small { width: auto; padding: 6px 12px; font-size: 0.85rem; background: var(--text-muted); }
        
        /* UIパーツ */
        .pin-box { text-align: center; font-size: 3rem; font-weight: bold; color: var(--primary); letter-spacing: 8px; margin: 10px 0; }
        .status-bar { padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; background: #F3F4F6; }
        .status-bar.connected { background: #D1FAE5; color: #065F46; }
        .status-bar.waiting { background: #FEF3C7; color: #92400E; }
        .status-bar.disconnected { background: #FEE2E2; color: #991B1B; }
        
        .member-list { list-style: none; padding: 0; margin: 0 0 20px 0; }
        .member-list li {
            padding: 12px; border: 1px solid #E5E7EB; margin-bottom: 8px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center; background: #F9FAFB;
        }

        /* カスタムモーダル（処理を止めない） */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background: white; padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="name-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 style="color: var(--primary);">ボケナスへようこそ！</h2>
            <p>相手に表示されるデバイス名を入力してください。</p>
            <input type="text" id="setup-name" placeholder="例: 私のスマホ" maxlength="15">
            <button onclick="saveNameAndInit()">保存してはじめる</button>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 id="confirm-title" style="color: var(--primary); margin-top:0;">接続要求</h2>
            <p id="confirm-desc">ファイル共有を許可しますか？</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="acceptConnection()" style="background: var(--success);">許可する</button>
                <button onclick="rejectConnection()" style="background: var(--danger);">拒否</button>
            </div>
        </div>
    </div>

    <div class="header">
        <h1>🍆 Bokenasu</h1>
        <p>かんたん・安全なファイル共有</p>
        <div class="name-display">
            <span id="display-my-name" style="font-weight:bold; color:var(--primary);">名前未設定</span>
            <button class="small" onclick="openNameModal()">名前を変更</button>
        </div>
    </div>

    <div class="container">
        <div id="connection-panel" class="hidden" style="padding: 20px; border-bottom: 2px solid #E5E7EB;">
            <div id="status-bar" class="status-bar">未接続</div>
            <div id="file-transfer-area" class="hidden">
                <input type="file" id="file-input" style="margin-bottom: 10px;">
                <button onclick="sendFile()">📤 ファイルを送信</button>
                <button onclick="disconnect()" class="danger">🔌 切断する</button>
            </div>
        </div>

        <div class="tabs" id="tabs-menu">
            <div class="tab active" onclick="switchTab('pin')">1対1 (PIN)</div>
            <div class="tab" onclick="switchTab('room')">ルーム (合言葉)</div>
        </div>

        <div id="tab-pin" class="content active">
            <h3>あなたのPINコード</h3>
            <div class="pin-box" id="my-pin">----</div>
            <h3 style="margin-top: 30px;">相手と繋ぐ</h3>
            <input type="number" id="target-pin" placeholder="相手の5桁のPINを入力">
            <button onclick="connectByPin()">接続要求を送る</button>
        </div>

        <div id="tab-room" class="content">
            <div id="room-setup">
                <h3>ルームを作成・参加</h3>
                <input type="text" id="room-password" placeholder="合言葉 (例: bokenasu123)">
                <div style="display: flex; gap: 10px;">
                    <button onclick="createRoom()" style="background: var(--success);">作成</button>
                    <button onclick="joinRoom()">参加</button>
                </div>
            </div>

            <div id="room-active" class="hidden">
                <h3 id="room-title">ルーム: ----</h3>
                <p>オンラインのメンバー</p>
                <ul class="member-list" id="room-members"></ul>
                <button onclick="leaveRoom()" class="danger">ルームを退出・削除</button>
            </div>
        </div>
    </div>

    <script>
        let myName = "";
        let myPin = Math.floor(10000 + Math.random() * 90000).toString();
        let myPeerId = 'bokenasu-usr-' + myPin;
        let peer = null;          
        let currentConn = null;   
        let reconnectTimer = null;
        let incomingConn = null;  // 承認待ちの接続を一時保存する変数
        
        let roomHostPeer = null;  
        let roomMembers = [];     
        let roomConnection = null;

        window.onload = () => {
            myName = localStorage.getItem('bokenasu_name');
            if (!myName) {
                openNameModal();
            } else {
                document.getElementById('display-my-name').innerText = myName;
                initPeer();
            }
        };

        function openNameModal() {
            document.getElementById('setup-name').value = myName || "";
            document.getElementById('name-modal').classList.remove('hidden');
        }

        function saveNameAndInit() {
            const nameInput = document.getElementById('setup-name').value.trim();
            if (!nameInput) return alert('名前を入力してください！');
            localStorage.setItem('bokenasu_name', nameInput);
            myName = nameInput;
            document.getElementById('display-my-name').innerText = myName;
            document.getElementById('name-modal').classList.add('hidden');
            if (!peer) initPeer(); // 初回のみPeerを起動
        }

        function initPeer() {
            document.getElementById('my-pin').innerText = myPin;
            peer = new Peer(myPeerId);

            peer.on('connection', (conn) => {
                const callerName = conn.metadata ? conn.metadata.name : '名無し';
                
                if (currentConn && currentConn.open && currentConn.peer !== conn.peer) {
                    const sendBusy = () => { conn.send({ type: 'sys', msg: 'busy' }); setTimeout(()=>conn.close(), 500); };
                    if (conn.open) sendBusy(); else conn.on('open', sendBusy);
                    return;
                }

                // ブラウザの処理を止めない自作モーダルを表示
                incomingConn = conn;
                document.getElementById('confirm-title').innerText = `${callerName} さん`;
                document.getElementById('confirm-modal').classList.remove('hidden');
            });
        }

        // --- 自作モーダルの「許可」「拒否」ボタンの処理 ---
        function acceptConnection() {
            document.getElementById('confirm-modal').classList.add('hidden');
            if (!incomingConn) return;
            
            const callerName = incomingConn.metadata ? incomingConn.metadata.name : '名無し';
            setupFileConnection(incomingConn, callerName);
            
            const sendAccept = () => incomingConn.send({ type: 'sys', msg: 'accepted', name: myName });
            // 接続が開いていればすぐ送信、開いていなければ開くのを待って送信（これがバグ解消の肝）
            if (incomingConn.open) sendAccept();
            else incomingConn.on('open', sendAccept);
        }

        function rejectConnection() {
            document.getElementById('confirm-modal').classList.add('hidden');
            if (!incomingConn) return;
            
            const sendReject = () => { incomingConn.send({ type: 'sys', msg: 'rejected' }); setTimeout(()=>incomingConn.close(), 500); };
            if (incomingConn.open) sendReject();
            else incomingConn.on('open', sendReject);
            incomingConn = null;
        }

        // --- 通信処理 ---
        function connectByPin() {
            const targetPin = document.getElementById('target-pin').value;
            if (targetPin.length !== 5) return alert('5桁のPINを入力してください。');
            startConnection('bokenasu-usr-' + targetPin);
        }

        function startConnection(targetPeerId) {
            if (currentConn && currentConn.open) return alert('既に接続中です。');
            updateStatus('相手の承認を待機中...', 'waiting');
            showPanel(true);

            // reliable: true を追加してデータ転送速度・安定性を向上
            const conn = peer.connect(targetPeerId, { metadata: { name: myName }, reliable: true });
            
            conn.on('data', (data) => {
                if (data.type === 'sys') {
                    if (data.msg === 'accepted') {
                        setupFileConnection(conn, data.name);
                        alert(`「${data.name}」さんと接続しました！`);
                    } else if (data.msg === 'rejected') {
                        alert('接続が拒否されました。');
                        disconnect();
                    } else if (data.msg === 'busy') {
                        alert('相手は別のユーザーと通信中です。');
                        disconnect();
                    }
                }
            });
            conn.on('close', () => { if(!currentConn) disconnect(); });
        }

        function setupFileConnection(conn, peerName) {
            currentConn = conn;
            clearTimeout(reconnectTimer); reconnectTimer = null;
            
            updateStatus(`🟢 ${peerName} と接続中`, 'connected');
            document.getElementById('file-transfer-area').classList.remove('hidden');
            document.getElementById('tabs-menu').classList.add('hidden');
            document.getElementById('tab-pin').classList.remove('active');
            document.getElementById('tab-room').classList.remove('active');

            conn.on('data', (data) => {
                if (data.type === 'file') downloadFile(data.file, data.filename, data.filetype);
            });

            conn.on('close', () => {
                if (reconnectTimer) return; 
                updateStatus(`⚠️ 相手の接続を待っています...`, 'waiting');
                document.getElementById('file-transfer-area').classList.add('hidden');
                
                reconnectTimer = setTimeout(() => {
                    updateStatus(`❌ 切断されました`, 'disconnected');
                    currentConn = null; reconnectTimer = null;
                    setTimeout(() => disconnect(), 2000);
                }, 10000);
            });
        }

        function sendFile() {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            if (!file) return alert('ファイルを選択してください');
            if (!currentConn || !currentConn.open) return alert('接続されていません。');

            currentConn.send({ type: 'file', file: file, filename: file.name, filetype: file.type });
            alert('送信しました！');
            fileInput.value = '';
        }

        function downloadFile(fileData, filename, filetype) {
            const blob = new Blob([fileData], { type: filetype });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; a.click();
            URL.revokeObjectURL(url);
            alert(`「${filename}」を受信しました！`);
        }

        function disconnect() {
            if (currentConn) { currentConn.close(); currentConn = null; }
            clearTimeout(reconnectTimer); reconnectTimer = null;
            
            updateStatus('未接続', '');
            showPanel(false);
            document.getElementById('file-transfer-area').classList.add('hidden');
            document.getElementById('tabs-menu').classList.remove('hidden');
            
            const activeTabId = document.querySelector('.tab.active').getAttribute('onclick').match(/'([^']+)'/)[1];
            document.getElementById(`tab-${activeTabId}`).classList.add('active');
        }

        // --- ルーム機能 ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        function createRoom() {
            const pass = document.getElementById('room-password').value.trim();
            if (!pass) return alert('合言葉を入力してください');
            
            const roomId = 'bokenasu-rm-' + pass;
            roomHostPeer = new Peer(roomId);
            
            roomHostPeer.on('open', () => {
                document.getElementById('room-title').innerText = `ルーム: ${pass} (ホスト)`;
                document.getElementById('room-setup').classList.add('hidden');
                document.getElementById('room-active').classList.remove('hidden');
                roomMembers = [{ id: myPeerId, name: myName + " (ホスト)" }];
                updateRoomUI();
            });

            roomHostPeer.on('error', (err) => {
                if (err.type === 'unavailable-id') alert('その合言葉のルームは既に存在します。「参加」してください。');
                else alert('ルーム作成エラー: ' + err.message);
            });

            roomHostPeer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.type === 'join') {
                        roomMembers.push({ id: data.userId, name: data.name, conn: conn });
                        broadcastRoomMembers();
                    }
                });
                conn.on('close', () => {
                    roomMembers = roomMembers.filter(m => m.conn !== conn);
                    broadcastRoomMembers();
                });
            });
        }

        function joinRoom() {
            const pass = document.getElementById('room-password').value.trim();
            if (!pass) return alert('合言葉を入力してください');
            
            const roomId = 'bokenasu-rm-' + pass;
            roomConnection = peer.connect(roomId);
            
            roomConnection.on('open', () => {
                roomConnection.send({ type: 'join', userId: myPeerId, name: myName });
                document.getElementById('room-title').innerText = `ルーム: ${pass}`;
                document.getElementById('room-setup').classList.add('hidden');
                document.getElementById('room-active').classList.remove('hidden');
            });

            roomConnection.on('data', (data) => {
                if (data.type === 'member_list') {
                    roomMembers = data.members; updateRoomUI();
                }
            });

            roomConnection.on('close', () => { alert('ルームが解散されました。'); leaveRoom(); });
            roomConnection.on('error', () => alert('ルームが見つかりません。'));
        }

        function broadcastRoomMembers() {
            updateRoomUI();
            const safeList = roomMembers.map(m => ({ id: m.id, name: m.name }));
            roomMembers.forEach(member => {
                if (member.conn && member.conn.open) member.conn.send({ type: 'member_list', members: safeList });
            });
        }

        function updateRoomUI() {
            const listEl = document.getElementById('room-members');
            listEl.innerHTML = '';
            roomMembers.forEach(m => {
                if (m.id === myPeerId) return; 
                const li = document.createElement('li');
                li.innerHTML = `<span>${m.name}</span> <button class="small" onclick="startConnection('${m.id}')">接続</button>`;
                listEl.appendChild(li);
            });
            if (listEl.innerHTML === '') listEl.innerHTML = '<li style="color:#999; justify-content:center;">他のメンバーを待っています...</li>';
        }

        function leaveRoom() {
            if (roomHostPeer) { roomHostPeer.destroy(); roomHostPeer = null; }
            if (roomConnection) { roomConnection.close(); roomConnection = null; }
            roomMembers = [];
            document.getElementById('room-setup').classList.remove('hidden');
            document.getElementById('room-active').classList.add('hidden');
        }

        function updateStatus(text, className) {
            const sb = document.getElementById('status-bar');
            sb.innerText = text; sb.className = 'status-bar ' + className;
        }
        function showPanel(show) {
            const panel = document.getElementById('connection-panel');
            if (show) panel.classList.remove('hidden'); else panel.classList.add('hidden');
        }
    </script>
</body>
</html>
