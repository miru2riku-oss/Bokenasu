<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bokenasu - P2P File Share & Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --primary: #4F46E5; --primary-hover: #4338CA;
            --bg-color: #F3F4F6; --card-bg: #FFFFFF;
            --text-main: #1F2937; --text-muted: #6B7280;
            --danger: #EF4444; --success: #10B981; --warning: #F59E0B;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; color: var(--primary); font-size: 2.5rem; letter-spacing: -1px; }
        .header p { margin: 5px 0 0; color: var(--text-muted); }
        .name-display { margin-top: 10px; display: inline-flex; align-items: center; gap: 10px; background: #E5E7EB; padding: 5px 15px; border-radius: 20px; font-weight: bold; color: var(--primary); }
        
        .container { width: 100%; max-width: 600px; background: var(--card-bg); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: auto; }
        
        .tabs { display: flex; background: #E5E7EB; }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: bold; cursor: pointer; color: var(--text-muted); transition: 0.3s; }
        .tab.active { background: var(--card-bg); color: var(--primary); border-top: 3px solid var(--primary); }
        .content { padding: 25px; display: none; }
        .content.active { display: block; }
        
        h3 { margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid #F3F4F6; padding-bottom: 10px; }
        
        input[type="text"], input[type="password"], input[type="number"] { width: 100%; padding: 12px; margin: 8px 0 16px; border: 1px solid #D1D5DB; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: var(--primary-hover); }
        button:disabled { background: #9CA3AF; cursor: not-allowed; }
        button.danger { background: var(--danger); margin-top: 10px; }
        button.danger:hover { background: #DC2626; }
        button.success { background: var(--success); }
        button.small { width: auto; padding: 6px 12px; font-size: 0.85rem; background: var(--text-muted); }
        button.small-danger { width: auto; padding: 6px 12px; font-size: 0.85rem; background: var(--danger); }
        button.small-success { width: auto; padding: 6px 12px; font-size: 0.85rem; background: var(--success); }
        
        .status-bar { padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; background: #F3F4F6; }
        .status-bar.connected { background: #D1FAE5; color: #065F46; }
        .status-bar.waiting { background: #FEF3C7; color: #92400E; }
        .status-bar.disconnected { background: #FEE2E2; color: #991B1B; }
        
        .list-group { list-style: none; padding: 0; margin: 0 0 20px 0; }
        .list-group li { padding: 12px; border: 1px solid #E5E7EB; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; background: #F9FAFB; flex-wrap: wrap; gap: 10px; }
        
        .chat-box { height: 200px; overflow-y: auto; border: 1px solid #E5E7EB; border-radius: 8px; padding: 10px; margin-bottom: 10px; background: #F9FAFB; display: flex; flex-direction: column; gap: 8px; }
        .chat-msg { background: white; padding: 8px 12px; border-radius: 12px; border: 1px solid #E5E7EB; max-width: 80%; align-self: flex-start; word-break: break-all; }
        .chat-msg.self { background: #E0E7FF; border-color: #C7D2FE; align-self: flex-end; }
        .chat-msg span { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 2px; }
        .chat-input-area { display: flex; gap: 10px; }
        .chat-input-area input { margin: 0; flex: 1; }
        .chat-input-area button { width: auto; padding: 0 20px; }

        .file-status-box { padding: 15px; background: #EEF2FF; border: 1px solid #C7D2FE; border-radius: 8px; margin-top: 10px; font-size: 0.95rem; text-align: center; }

        .online-dot { width: 12px; height: 12px; border-radius: 50%; background-color: #D1D5DB; display: inline-block; margin-right: 8px; }
        .online-dot.active { background-color: var(--success); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; }
        .hidden { display: none !important; }

        .footer-id { font-size: 0.75rem; color: #9CA3AF; margin-top: 20px; text-align: center; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="name-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 style="color: var(--primary);">Bokenasu</h2>
            <p>相手に表示されるデバイス名を入力してください。</p>
            <input type="text" id="setup-name" placeholder="例: 私のPC" maxlength="15">
            <button onclick="saveNameAndInit()">保存してはじめる</button>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 id="confirm-title" style="color: var(--primary); margin-top:0;">接続要求</h2>
            <p id="confirm-desc">ファイル共有を許可しますか？</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="acceptConnection()" class="success">許可する</button>
                <button onclick="rejectConnection()" class="danger">拒否</button>
            </div>
        </div>
    </div>

    <div class="header">
        <h1>Bokenasu</h1>
        <p>かんたん・安全なファイル共有</p>
        <div class="name-display">
            <span id="display-my-name">名前未設定</span>
            <button class="small" onclick="openNameModal()" style="margin-left:10px;">名前変更</button>
        </div>
    </div>

    <div class="container">
        <div id="connection-panel" class="hidden" style="padding: 20px; border-bottom: 2px solid #E5E7EB;">
            <div id="status-bar" class="status-bar">未接続</div>
            
            <div id="action-area" class="hidden">
                <button id="add-friend-btn" onclick="sendFriendRequest()" class="small" style="margin-bottom: 15px;">フレンド追加</button>

                <div style="background: #F3F4F6; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                    <h3 style="font-size: 1rem; border:none; padding:0; margin-bottom:10px;">ファイル送信 (双方向)</h3>
                    <input type="file" id="file-input" style="margin-bottom: 10px; width:100%;">
                    <button onclick="sendFileReq()">送信する</button>
                    <div id="file-transfer-status" class="hidden file-status-box"></div>
                </div>

                <div class="chat-box" id="p2p-chat-box"></div>
                <div class="chat-input-area">
                    <input type="text" id="p2p-chat-input" placeholder="メッセージを入力...">
                    <button onclick="sendP2PChat()">送信</button>
                </div>

                <button onclick="disconnect(true)" class="danger" style="margin-top: 20px;">切断する</button>
            </div>
        </div>

        <div class="tabs" id="tabs-menu">
            <div class="tab active" onclick="switchTab('pin')">1対1 (ID接続)</div>
            <div class="tab" onclick="switchTab('room')">ルーム</div>
            <div class="tab" onclick="switchTab('friends')">フレンド</div>
        </div>

        <div id="tab-pin" class="content active">
            <h3>相手と繋ぐ</h3>
            <p style="font-size:0.9rem; color:var(--text-muted);">相手の画面下部に表示されている10桁のIDを入力してください。</p>
            <input type="text" id="target-id" placeholder="例: ABCDE12345" maxlength="10" style="text-transform: uppercase;">
            <button onclick="connectById()">接続要求を送る</button>
        </div>

        <div id="tab-room" class="content">
            <div id="room-setup">
                <h3>ルームを作成・参加</h3>
                <input type="text" id="room-password" placeholder="合言葉 (例: bokenasu123)">
                <div style="display: flex; gap: 10px;">
                    <button onclick="createRoom()" class="success">作成</button>
                    <button onclick="joinRoom()">参加要求</button>
                </div>
            </div>

            <div id="room-active" class="hidden">
                <h3 id="room-title">ルーム: ----</h3>
                <p>メンバー一覧 (タップで個別接続)</p>
                <ul class="list-group" id="room-members"></ul>
                
                <h3 style="margin-top: 20px; border:none;">ルームチャット</h3>
                <div class="chat-box" id="room-chat-box"></div>
                <div class="chat-input-area">
                    <input type="text" id="room-chat-input" placeholder="全体メッセージ...">
                    <button onclick="sendRoomChat()">送信</button>
                </div>

                <button onclick="leaveRoom()" class="danger" style="margin-top: 20px;">ルームを退出・削除</button>
            </div>
        </div>

        <div id="tab-friends" class="content">
            <h3>フレンド一覧</h3>
            <ul class="list-group" id="friends-list"></ul>
        </div>
    </div>

    <div class="footer-id">あなたのID: <span id="display-my-uid" style="font-weight:bold;"></span></div>

    <script>
        // =========================================
        // ID生成・初期化ロジック
        // =========================================
        function generateUID() {
            let letters = '';
            for(let i=0; i<5; i++) letters += String.fromCharCode(65 + Math.floor(Math.random() * 26));
            let numbers = '';
            for(let i=0; i<5; i++) numbers += Math.floor(Math.random() * 10).toString();
            return letters + numbers;
        }

        let myName = localStorage.getItem('bokenasu_name') || "";
        let myUid = localStorage.getItem('bokenasu_uid');
        if (!myUid) {
            myUid = generateUID();
            localStorage.setItem('bokenasu_uid', myUid);
        }
        
        let myPeerId = 'bokenasu-usr-' + myUid;
        let peer = null;          
        let currentConn = null;   
        let reconnectTimer = null;
        let incomingConn = null;  
        let isManualDisconnect = false;
        
        let roomHostPeer = null;  
        let roomMembers = [];     
        let roomConnection = null;

        // データ保存用
        let friends = JSON.parse(localStorage.getItem('bokenasu_friends') || '[]');
        let bannedUsers = JSON.parse(localStorage.getItem('bokenasu_banned') || '[]'); // ルームBAN
        let blockedUsers = JSON.parse(localStorage.getItem('bokenasu_blocked') || '[]'); // 個人ブロック

        let sendingFileObj = null;
        let receiveBuffer = [];
        let receiveMeta = null;
        const CHUNK_SIZE = 64 * 1024;

        window.onload = () => {
            document.getElementById('display-my-uid').innerText = myUid;
            if (!myName) openNameModal();
            else { document.getElementById('display-my-name').innerText = myName; initPeer(); }
            
            renderFriends();
            setInterval(checkFriendsStatus, 15000); 
        };

        function openNameModal() {
            document.getElementById('setup-name').value = myName || "";
            document.getElementById('name-modal').classList.remove('hidden');
        }

        function saveNameAndInit() {
            const nameInput = document.getElementById('setup-name').value.trim();
            if (!nameInput) return alert('名前を入力してください。');
            localStorage.setItem('bokenasu_name', nameInput);
            myName = nameInput;
            document.getElementById('display-my-name').innerText = myName;
            document.getElementById('name-modal').classList.add('hidden');
            if (!peer) initPeer(); 
        }

        function initPeer() {
            peer = new Peer(myPeerId);

            peer.on('connection', (conn) => {
                // Ping通信はすぐ閉じる
                if (conn.metadata && conn.metadata.type === 'ping') {
                    conn.on('open', () => conn.close());
                    return;
                }

                const senderUid = conn.peer.replace('bokenasu-usr-', '');
                
                // ブロックリストのチェック
                if (blockedUsers.includes(senderUid)) {
                    conn.on('open', () => { conn.send({ type: 'sys', msg: 'rejected' }); setTimeout(()=>conn.close(), 500); });
                    return;
                }

                const callerName = conn.metadata ? conn.metadata.name : '名無し';
                
                if (currentConn && currentConn.open && currentConn.peer !== conn.peer) {
                    const sendBusy = () => { conn.send({ type: 'sys', msg: 'busy' }); setTimeout(()=>conn.close(), 500); };
                    if (conn.open) sendBusy(); else conn.on('open', sendBusy);
                    return;
                }

                incomingConn = conn;
                document.getElementById('confirm-title').innerText = `${callerName} さん`;
                document.getElementById('confirm-modal').classList.remove('hidden');
            });
            
            setTimeout(checkFriendsStatus, 1000);
        }

        // =========================================
        // 1対1 接続ロジック
        // =========================================
        function acceptConnection() {
            document.getElementById('confirm-modal').classList.add('hidden');
            if (!incomingConn) return;
            const callerName = incomingConn.metadata ? incomingConn.metadata.name : '名無し';
            
            setupFileConnection(incomingConn, callerName); 
            
            const sendAccept = () => incomingConn.send({ type: 'sys', msg: 'accepted', name: myName });
            if (incomingConn.open) sendAccept(); else incomingConn.on('open', sendAccept);
        }

        function rejectConnection() {
            document.getElementById('confirm-modal').classList.add('hidden');
            if (!incomingConn) return;
            const sendReject = () => { incomingConn.send({ type: 'sys', msg: 'rejected' }); setTimeout(()=>incomingConn.close(), 500); };
            if (incomingConn.open) sendReject(); else incomingConn.on('open', sendReject);
            incomingConn = null;
        }

        function connectById() {
            const targetId = document.getElementById('target-id').value.trim().toUpperCase();
            if (targetId.length !== 10) return alert('10桁のIDを正しく入力してください。');
            if (targetId === myUid) return alert('自分のIDには接続できません。');
            startConnection(targetId);
        }

        function startConnection(targetUid) {
            if (currentConn && currentConn.open) return alert('既に接続中です。');
            updateStatus('相手の承認を待機中...', 'waiting');
            showPanel(true);

            const targetPeerId = 'bokenasu-usr-' + targetUid;
            const conn = peer.connect(targetPeerId, { metadata: { name: myName }, reliable: true });
            
            conn.on('data', (data) => {
                if (data.type === 'sys') {
                    if (data.msg === 'accepted') {
                        setupFileConnection(conn, data.name);
                        alert(`「${data.name}」さんと接続しました。`);
                    } else if (data.msg === 'rejected') {
                        alert('接続が拒否されました。'); disconnect(false);
                    } else if (data.msg === 'busy') {
                        alert('相手は別のユーザーと通信中です。'); disconnect(false);
                    }
                }
            });
            conn.on('error', () => { alert('相手が見つかりません。IDが間違っているか、オフラインです。'); disconnect(false); });
            conn.on('close', () => { if(!currentConn) disconnect(false); });
        }

        function setupFileConnection(conn, peerName) {
            currentConn = conn;
            isManualDisconnect = false;
            clearTimeout(reconnectTimer); reconnectTimer = null;
            document.getElementById('p2p-chat-box').innerHTML = ''; 
            resetFileTransferUI();
            
            updateStatus(`${peerName} と接続中`, 'connected');
            showPanel(true);
            document.getElementById('action-area').classList.remove('hidden');
            document.getElementById('tabs-menu').classList.add('hidden');
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));

            const targetUid = conn.peer.replace('bokenasu-usr-', '');
            const isFriend = friends.some(f => f.id === targetUid);
            document.getElementById('add-friend-btn').style.display = isFriend ? 'none' : 'block';

            conn.on('data', (data) => {
                if (data.type === 'file_req') handleFileRequest(data.filename, data.size, data.filetype);
                if (data.type === 'file_acc') startFileChunking();
                if (data.type === 'file_rej') setFileUIStatus('相手が受信を拒否しました。');
                if (data.type === 'file_chunk') handleFileChunk(data.index, data.total, data.data);
                if (data.type === 'file_done') setFileUIStatus('転送完了！(相手がダウンロードしました)', true);
                
                if (data.type === 'chat') appendChatMsg('p2p-chat-box', peerName, data.text, false);
                if (data.type === 'sys' && data.msg === 'friend_req') handleFriendRequest(data.id, data.name);
                if (data.type === 'sys' && data.msg === 'friend_acc') {
                    alert(`${data.name} さんがフレンド申請を承認しました！`);
                    addFriendLocal(data.id, data.name);
                    document.getElementById('add-friend-btn').style.display = 'none';
                }
                if (data.type === 'sys' && data.msg === 'manual_disconnect') {
                    alert('相手が切断しました。');
                    isManualDisconnect = true; disconnect(false);
                }
            });

            conn.on('close', () => {
                if (isManualDisconnect) return;
                if (reconnectTimer) return; 
                updateStatus(`通信が不安定です。待機中...`, 'waiting');
                document.getElementById('action-area').classList.add('hidden');
                reconnectTimer = setTimeout(() => {
                    alert('切断されました。');
                    currentConn = null; reconnectTimer = null; disconnect(false);
                }, 10000);
            });
        }

        // =========================================
        // ファイル転送
        // =========================================
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024; const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function resetFileTransferUI() {
            const el = document.getElementById('file-transfer-status');
            el.innerHTML = ''; el.classList.add('hidden');
            sendingFileObj = null; receiveBuffer = []; receiveMeta = null;
        }

        function setFileUIStatus(html, isSuccess = false) {
            const el = document.getElementById('file-transfer-status');
            el.innerHTML = html;
            el.style.background = isSuccess ? '#D1FAE5' : '#EEF2FF';
            el.style.borderColor = isSuccess ? '#A7F3D0' : '#C7D2FE';
            el.classList.remove('hidden');
        }

        function sendFileReq() {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            if (!file) return alert('ファイルを選択してください');
            if (!currentConn || !currentConn.open) return alert('接続されていません。');
            
            sendingFileObj = file;
            currentConn.send({ type: 'file_req', filename: file.name, size: file.size, filetype: file.type });
            setFileUIStatus('相手の承認を待っています...');
        }

        function handleFileRequest(filename, size, filetype) {
            receiveMeta = { filename, size, filetype };
            setFileUIStatus(`
                <p style="margin:0 0 10px 0;"><strong>${filename}</strong><br>サイズ: ${formatBytes(size)}</p>
                <p style="margin:0 0 10px 0;">このファイルを受信しますか？</p>
                <button onclick="acceptFileTransfer()" class="small-success">はい</button>
                <button onclick="rejectFileTransfer()" class="small-danger">いいえ</button>
            `);
        }

        function acceptFileTransfer() {
            receiveBuffer = [];
            currentConn.send({ type: 'file_acc' });
            setFileUIStatus('受信準備中...');
        }
        function rejectFileTransfer() { currentConn.send({ type: 'file_rej' }); resetFileTransferUI(); }

        async function startFileChunking() {
            setFileUIStatus('送信開始...');
            let offset = 0;
            const totalChunks = Math.ceil(sendingFileObj.size / CHUNK_SIZE);
            let currentChunk = 0;
            const fileReader = new FileReader();

            while (offset < sendingFileObj.size) {
                if (!currentConn || !currentConn.open) break;
                const slice = sendingFileObj.slice(offset, offset + CHUNK_SIZE);
                const data = await new Promise(resolve => {
                    fileReader.onload = e => resolve(e.target.result);
                    fileReader.readAsArrayBuffer(slice);
                });

                currentConn.send({ type: 'file_chunk', index: currentChunk, total: totalChunks, data: data });
                offset += CHUNK_SIZE; currentChunk++;
                
                if (currentChunk % 5 === 0 || currentChunk === totalChunks) {
                    const percent = Math.floor((currentChunk / totalChunks) * 100);
                    setFileUIStatus(`送信中... ${percent}%`);
                    await new Promise(r => setTimeout(r, 2)); 
                }
            }
        }

        function handleFileChunk(index, total, data) {
            receiveBuffer.push(data);
            if (index % 5 === 0 || index + 1 === total) {
                const percent = Math.floor(((index + 1) / total) * 100);
                setFileUIStatus(`受信中... ${percent}%`);
            }
            if (index + 1 === total) {
                currentConn.send({ type: 'file_done' });
                showFileDownloadUI();
            }
        }

        function showFileDownloadUI() {
            const blob = new Blob(receiveBuffer, { type: receiveMeta.filetype });
            const url = URL.createObjectURL(blob);
            setFileUIStatus(`
                <p style="margin:0 0 10px 0;"><strong>${receiveMeta.filename}</strong> の受信完了</p>
                <a href="${url}" download="${receiveMeta.filename}" style="display:inline-block; padding:8px 15px; background:var(--primary); color:white; text-decoration:none; border-radius:8px;">ダウンロードを実行</a>
            `, true);
            receiveBuffer = []; 
        }

        // =========================================
        // 汎用・チャット機能
        // =========================================
        function disconnect(isManual = false) {
            isManualDisconnect = true;
            if (isManual && currentConn && currentConn.open) currentConn.send({ type: 'sys', msg: 'manual_disconnect' });
            if (currentConn) { currentConn.close(); currentConn = null; }
            clearTimeout(reconnectTimer); reconnectTimer = null;
            
            updateStatus('未接続', '');
            showPanel(false);
            document.getElementById('action-area').classList.add('hidden');
            document.getElementById('tabs-menu').classList.remove('hidden');
            document.querySelector('.tab.active').click(); 
        }

        function parseLinks(text) {
            const escaped = text.replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag]));
            return escaped.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:var(--primary);">$1</a>');
        }

        function appendChatMsg(boxId, sender, text, isSelf) {
            const box = document.getElementById(boxId);
            const div = document.createElement('div');
            div.className = `chat-msg ${isSelf ? 'self' : ''}`;
            div.innerHTML = `<span>${sender}</span>${parseLinks(text)}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function sendP2PChat() {
            const input = document.getElementById('p2p-chat-input');
            const text = input.value.trim();
            if (!text || !currentConn || !currentConn.open) return;
            currentConn.send({ type: 'chat', text: text });
            appendChatMsg('p2p-chat-box', myName, text, true);
            input.value = '';
        }

        // =========================================
        // フレンド管理機能
        // =========================================
        function sendFriendRequest() {
            if (!currentConn || !currentConn.open) return;
            currentConn.send({ type: 'sys', msg: 'friend_req', id: myUid, name: myName });
            alert('フレンド申請を送信しました。');
        }

        function handleFriendRequest(targetUid, targetName) {
            if (confirm(`${targetName} さんからフレンド申請が届きました。承認しますか？`)) {
                addFriendLocal(targetUid, targetName);
                if (currentConn && currentConn.open) {
                    currentConn.send({ type: 'sys', msg: 'friend_acc', id: myUid, name: myName });
                    document.getElementById('add-friend-btn').style.display = 'none';
                }
            }
        }

        function addFriendLocal(id, name) {
            if (!friends.some(f => f.id === id)) {
                friends.push({ id, name });
                localStorage.setItem('bokenasu_friends', JSON.stringify(friends));
                renderFriends(); checkFriendsStatus();
            }
        }

        function deleteFriend(id) {
            if(!confirm('本当にこのフレンドを削除しますか？')) return;
            friends = friends.filter(f => f.id !== id);
            localStorage.setItem('bokenasu_friends', JSON.stringify(friends));
            renderFriends();
        }

        function blockUser(id) {
            if(!confirm('ブロックすると、今後このユーザーからの接続や参加要求をすべて拒否します。ブロックしますか？')) return;
            friends = friends.filter(f => f.id !== id);
            localStorage.setItem('bokenasu_friends', JSON.stringify(friends));
            if(!blockedUsers.includes(id)) {
                blockedUsers.push(id);
                localStorage.setItem('bokenasu_blocked', JSON.stringify(blockedUsers));
            }
            renderFriends();
        }

        function renderFriends() {
            const list = document.getElementById('friends-list');
            list.innerHTML = '';
            if (friends.length === 0) list.innerHTML = '<li style="color:#999; justify-content:center;">フレンドはいません</li>';
            
            friends.forEach(f => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <div style="flex-grow:1;"><span class="online-dot" id="dot-${f.id}"></span> ${f.name}</div>
                    <div style="display:flex; gap:5px;">
                        <button class="small-success" onclick="startConnection('${f.id}')">接続</button>
                        <button class="small-danger" onclick="deleteFriend('${f.id}')">削除</button>
                        <button class="small-danger" onclick="blockUser('${f.id}')">ブロック</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function checkFriendsStatus() {
            if (!peer || peer.disconnected) return;
            friends.forEach(f => {
                const dot = document.getElementById(`dot-${f.id}`);
                const testConn = peer.connect('bokenasu-usr-' + f.id, { metadata: { type: 'ping' } });
                testConn.on('open', () => { if (dot) dot.classList.add('active'); testConn.close(); });
                testConn.on('error', () => { if (dot) dot.classList.remove('active'); });
                setTimeout(() => { if (dot && testConn && !testConn.open) dot.classList.remove('active'); }, 3000);
            });
        }

        // =========================================
        // ルーム機能（参加要求システム）
        // =========================================
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
            if (tabId === 'friends') checkFriendsStatus();
        }

        function createRoom() {
            const pass = document.getElementById('room-password').value.trim();
            if (!pass) return alert('合言葉を入力してください');
            
            roomHostPeer = new Peer('bokenasu-rm-' + pass);
            roomHostPeer.on('open', () => {
                document.getElementById('room-title').innerText = `ルーム: ${pass} (ホスト)`;
                document.getElementById('room-setup').classList.add('hidden');
                document.getElementById('room-active').classList.remove('hidden');
                document.getElementById('room-chat-box').innerHTML = '';
                roomMembers = [{ id: myUid, name: myName + " (ホスト)" }];
                updateRoomUI();
            });
            roomHostPeer.on('error', (err) => {
                if (err.type === 'unavailable-id') alert('その合言葉のルームは存在します。「参加要求」を押してください。');
            });
            roomHostPeer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.type === 'join_req') {
                        if (bannedUsers.includes(data.userId) || blockedUsers.includes(data.userId)) {
                            conn.send({ type: 'sys', msg: 'banned' });
                            setTimeout(() => conn.close(), 500);
                            return;
                        }
                        if (confirm(`【ルーム参加要求】\n「${data.name}」さんがルームへの参加を求めています。許可しますか？`)) {
                            conn.send({ type: 'join_acc' });
                            roomMembers.push({ id: data.userId, name: data.name, conn: conn });
                            broadcastRoomData({ type: 'member_list', members: roomMembers.map(m=>({id:m.id, name:m.name})) });
                        } else {
                            conn.send({ type: 'join_rej' });
                            setTimeout(() => conn.close(), 500);
                        }
                    }
                    if (data.type === 'room_chat') {
                        if (data.senderId !== myUid) appendChatMsg('room-chat-box', data.name, data.text, false);
                        broadcastRoomData(data); 
                    }
                });
                conn.on('close', () => {
                    roomMembers = roomMembers.filter(m => m.conn !== conn);
                    broadcastRoomData({ type: 'member_list', members: roomMembers.map(m=>({id:m.id, name:m.name})) });
                });
            });
        }

        function joinRoom() {
            const pass = document.getElementById('room-password').value.trim();
            if (!pass) return alert('合言葉を入力してください');
            
            roomConnection = peer.connect('bokenasu-rm-' + pass);
            roomConnection.on('open', () => {
                roomConnection.send({ type: 'join_req', userId: myUid, name: myName });
                alert('ホストに参加要求を送信しました。承認を待っています...');
            });
            roomConnection.on('data', (data) => {
                if (data.type === 'sys' && data.msg === 'banned') {
                    alert('あなたはこのホストのルームからBANされています。'); leaveRoom();
                }
                if (data.type === 'join_rej') {
                    alert('参加要求が拒否されました。'); leaveRoom();
                }
                if (data.type === 'join_acc') {
                    document.getElementById('room-title').innerText = `ルーム: ${pass}`;
                    document.getElementById('room-setup').classList.add('hidden');
                    document.getElementById('room-active').classList.remove('hidden');
                    document.getElementById('room-chat-box').innerHTML = '';
                }
                if (data.type === 'member_list') { roomMembers = data.members; updateRoomUI(); }
                if (data.type === 'room_chat') {
                    if (data.senderId !== myUid) appendChatMsg('room-chat-box', data.name, data.text, false);
                }
            });
            roomConnection.on('close', () => { 
                if(document.getElementById('room-active').classList.contains('hidden') === false) {
                    alert('ルームが解散されたか、通信が切断されました。'); leaveRoom(); 
                }
            });
            roomConnection.on('error', () => alert('ルームが見つかりません。ホストが作成していない可能性があります。'));
        }

        function broadcastRoomData(data) {
            updateRoomUI();
            roomMembers.forEach(m => { 
                if (m.conn && m.conn.open) {
                    if (data.type === 'room_chat' && m.id === data.senderId) return;
                    m.conn.send(data); 
                }
            });
        }

        function updateRoomUI() {
            const listEl = document.getElementById('room-members');
            listEl.innerHTML = '';
            roomMembers.forEach(m => {
                if (m.id === myUid) return; 
                const li = document.createElement('li');
                const banBtn = roomHostPeer ? `<button class="small-danger" onclick="banMember('${m.id}')">BAN</button>` : '';
                
                li.innerHTML = `
                    <span style="flex-grow:1;">${m.name}</span> 
                    <div style="display:flex; gap:5px;">
                        <button class="small-success" onclick="startConnection('${m.id}')">接続</button>
                        ${banBtn}
                    </div>
                `;
                listEl.appendChild(li);
            });
            if (listEl.innerHTML === '') listEl.innerHTML = '<li style="color:#999; justify-content:center;">他のメンバーを待機中...</li>';
        }

        function banMember(memberId) {
            if (!confirm('このメンバーを追放し、二度と参加できないようにしますか？')) return;
            bannedUsers.push(memberId);
            localStorage.setItem('bokenasu_banned', JSON.stringify(bannedUsers));
            
            const member = roomMembers.find(m => m.id === memberId);
            if (member && member.conn) {
                member.conn.send({ type: 'sys', msg: 'banned' });
                setTimeout(() => member.conn.close(), 500);
            }
            roomMembers = roomMembers.filter(m => m.id !== memberId);
            broadcastRoomData({ type: 'member_list', members: roomMembers.map(m=>({id:m.id, name:m.name})) });
        }

        function sendRoomChat() {
            const input = document.getElementById('room-chat-input');
            const text = input.value.trim();
            if (!text) return;
            
            appendChatMsg('room-chat-box', myName, text, true);
            const msgData = { type: 'room_chat', name: myName, text: text, senderId: myUid };
            if (roomHostPeer) broadcastRoomData(msgData); 
            else if (roomConnection && roomConnection.open) roomConnection.send(msgData); 
            
            input.value = '';
        }

        function leaveRoom() {
            if (roomHostPeer) { roomHostPeer.destroy(); roomHostPeer = null; }
            if (roomConnection) { roomConnection.close(); roomConnection = null; }
            roomMembers = [];
            document.getElementById('room-setup').classList.remove('hidden');
            document.getElementById('room-active').classList.add('hidden');
        }

        function updateStatus(text, className) {
            const sb = document.getElementById('status-bar');
            sb.innerText = text; sb.className = 'status-bar ' + className;
        }
        function showPanel(show) {
            const panel = document.getElementById('connection-panel');
            if (show) panel.classList.remove('hidden'); else panel.classList.add('hidden');
        }
    </script>
</body>
</html>
